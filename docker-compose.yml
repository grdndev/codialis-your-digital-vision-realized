services:
  codialis.db:
    image: mysql:8.4
    container_name: codialis-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: codialis
      MYSQL_USER: codialis
      MYSQL_PASSWORD: codialis_dev
    volumes:
      - codialis_mysqldata:/var/lib/mysql
    networks:
      proxy:
        aliases:
          - db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "codialis", "-pcodialis_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  codialis.backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: codialis-server
    restart: unless-stopped
    depends_on:
      codialis.db:
        condition: service_healthy
    # All config (incl. DATABASE_URL) loaded from backend/.env (gitignored).
    env_file:
      - backend/.env
    networks:
      - proxy
    volumes:
      # live source reload; anonymous volume keeps node_modules inside container
      - .:/repo
      - /repo/backend/node_modules
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.codialis_landingpage.rule=Host(`landingback.codialis.com`)"
      - "traefik.http.routers.codialis_landingpage.entrypoints=websecure"
      - "traefik.http.routers.codialis_landingpage.tls.certresolver=myresolver"
      - "traefik.http.services.codialis_landingpage.loadbalancer.server.port=3001"

networks:
  proxy:
    external: true
volumes:
  codialis_mysqldata:
