services:
  db:
    image: mysql:8.4
    container_name: codialis-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: codialis
      MYSQL_USER: codialis
      MYSQL_PASSWORD: codialis_dev
    ports:
      - "3307:3306"
    volumes:
      - codialis_mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "codialis", "-pcodialis_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: codialis-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # All config (incl. DATABASE_URL) loaded from backend/.env (gitignored).
    env_file:
      - backend/.env
    ports:
      - "3001:3001"
    volumes:
      # live source reload; anonymous volume keeps node_modules inside container
      - .:/repo
      - /repo/backend/node_modules

volumes:
  codialis_mysqldata:
